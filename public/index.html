<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandas 数据分析实战训练营</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #ffffff; color: #333; line-height: 1.6; }
        .home-page { display: block; }
        .home-page.hidden { display: none; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .navbar-brand { font-size: 18px; font-weight: 600; color: #10b981; display: flex; align-items: center; gap: 10px; }
        .navbar-brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 40px 80px; background: linear-gradient(180deg, #f0fdf4 0%, #ffffff 100%); position: relative; overflow: hidden; }
        .hero-content { max-width: 800px; text-align: center; position: relative; z-index: 1; }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: white; border: 1px solid #e5e7eb; padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 500; color: #059669; margin-bottom: 24px; }
        .hero h1 { font-size: 56px; font-weight: 700; color: #111827; margin-bottom: 20px; letter-spacing: -1px; }
        .hero h1 span { color: #10b981; }
        .hero-description { font-size: 18px; color: #6b7280; margin-bottom: 40px; max-width: 560px; margin-left: auto; margin-right: auto; }
        .btn { padding: 14px 28px; border-radius: 8px; font-size: 15px; font-weight: 500; border: none; cursor: pointer; }
        .btn-primary { background: #10b981; color: white; }
        .btn-primary:hover { background: #059669; }
        .modules-section { padding: 100px 40px; background: #f9fafb; }
        .modules-container { max-width: 1100px; margin: 0 auto; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-label { display: inline-block; font-size: 13px; font-weight: 600; color: #10b981; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .section-header h2 { font-size: 36px; font-weight: 700; color: #111827; margin-bottom: 16px; }
        .section-header p { font-size: 16px; color: #6b7280; }
        .modules-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .module-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; cursor: pointer; transition: all 0.3s; display: flex; align-items: flex-start; gap: 16px; }
        .module-card:hover { border-color: #10b981; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .module-number { width: 40px; height: 40px; background: #f0fdf4; border: 1px solid #10b981; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #10b981; flex-shrink: 0; }
        .module-card:hover .module-number { background: #10b981; color: white; }
        .module-content h3 { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 6px; }
        .module-content p { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
        .module-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .module-tag { background: #f3f4f6; color: #6b7280; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 500; }
        .learn-page { display: none; height: 100vh; overflow: hidden; }
        .learn-page.active { display: flex; flex-direction: column; }
        .learn-header { height: 56px; background: white; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 24px; }
        .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: #6b7280; font-size: 14px; font-weight: 500; cursor: pointer; padding: 8px 12px; border-radius: 6px; }
        .back-btn:hover { background: #f3f4f6; }
        .learn-title { font-size: 14px; font-weight: 600; color: #111827; }
        .learn-title-badge { background: #10b981; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 8px; }
        .code-toolbar { height: 44px; background: white; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 12px; gap: 8px; }
        .toolbar-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #e5e7eb; }
        .toolbar-btn.run { background: #10b981; border-color: #10b981; color: white; }
        .toolbar-btn.run:hover { background: #059669; }
        .toolbar-btn.disabled { opacity: 0.5; cursor: not-allowed; }
        .code-main { flex: 1; display: flex; overflow: hidden; }
        .code-input-wrapper { flex: 1; background: white; }
        .code-input { width: 100%; height: 100%; background: transparent; color: #111827; border: none; padding: 16px; font-family: monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; }
        .output-panel { height: 180px; background: white; border-top: 1px solid #e5e7eb; display: flex; flex-direction: column; }
        .output-header { height: 32px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 12px; }
        .output-header-title { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; }
        .output-content { flex: 1; overflow: auto; padding: 12px 16px; font-family: monospace; font-size: 12px; line-height: 1.6; color: #374151; white-space: pre-wrap; }
        .loading-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
        .loading-spinner { width: 16px; height: 16px; border: 2px solid #e5e7eb; border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="home-page" id="homePage">
        <nav class="navbar">
            <div class="navbar-brand"><div class="navbar-brand-icon">📊</div>Pandas 数据分析实战训练营</div>
        </nav>
        <section class="hero">
            <div class="hero-content">
                <div class="hero-badge">🚀 纯前端 Python 运行环境</div>
                <h1>掌握 <span>Pandas</span><br>数据分析核心技能</h1>
                <p class="hero-description">从零开始学习 Pandas，通过实战练习掌握数据加载、清洗、分析等十大核心技能</p>
                <button class="btn btn-primary" onclick="scrollToModules()">开始学习 →</button>
            </div>
        </section>
        <section class="modules-section" id="modulesSection">
            <div class="modules-container">
                <div class="section-header">
                    <span class="section-label">课程模块</span>
                    <h2>十大核心技能</h2>
                    <p>从基础到进阶，循序渐进掌握 Pandas 数据分析</p>
                </div>
                <div class="modules-grid" id="modulesGrid"></div>
            </div>
        </section>
    </div>

    <div class="learn-page" id="learnPage">
        <header class="learn-header">
            <button class="back-btn" onclick="goHome()">← 返回首页</button>
            <span class="learn-title"><span class="learn-title-badge" id="skillBadge">01</span><span id="learnTitle">数据加载与查看</span></span>
            <div class="loading-indicator" id="loadingIndicator" style="display: none;">
                <div class="loading-spinner"></div>
                <span>加载中...</span>
            </div>
        </header>
        <div class="code-main">
            <div class="code-input-wrapper">
                <textarea class="code-input" id="codeInput" placeholder="在这里编写代码..." spellcheck="false"></textarea>
            </div>
        </div>
        <div class="code-toolbar">
            <button class="toolbar-btn run" id="runBtn" onclick="runCode()" disabled>▶ 运行代码</button>
            <button class="toolbar-btn" onclick="clearCode()">清空</button>
            <span id="statusText" style="margin-left: auto; font-size: 12px; color: #9ca3af;">Python 3.x</span>
        </div>
        <div class="output-panel">
            <div class="output-header"><span class="output-header-title">输出</span></div>
            <div class="output-content" id="outputContent">⏳ 正在初始化 Python 环境...</div>
        </div>
    </div>

<script>
const skillData = {
    1: {
        title: "数据加载与基础查看",
        description: "学习如何从CSV、Excel等文件加载数据，并查看数据的基本信息",
        tags: ["read_csv", "head", "info", "describe"],
        code: "import pandas as pd\n\n# 创建示例数据\ndata = {\n    \"name\": [\"张三\", \"李四\", \"王五\"],\n    \"age\": [25, 30, 35],\n    \"city\": [\"北京\", \"上海\", \"深圳\"]\n}\ndf = pd.DataFrame(data)\n\nprint(\"数据预览：\")\nprint(df)\nprint(\"\\n数据形状：\", df.shape)\nprint(\"\\n数据类型：\")\nprint(df.dtypes)"
    },
    2: {
        title: "数据筛选与条件查询",
        description: "学习使用loc、iloc和布尔索引进行数据筛选和查询",
        tags: ["loc", "iloc", "布尔索引", "条件筛选"],
        code: "import pandas as pd\n\ndata = {\n    \"name\": [\"张三\", \"李四\", \"王五\", \"赵六\"],\n    \"age\": [25, 30, 35, 40],\n    \"salary\": [8000, 12000, 15000, 20000]\n}\ndf = pd.DataFrame(data)\n\nprint(\"原始数据：\")\nprint(df)\n\nprint(\"\\n筛选年龄大于30的记录：\")\nprint(df[df['age'] > 30])"
    },
    3: {
        title: "缺失值检测与处理",
        description: "学习检测缺失值、分析缺失模式，并使用不同策略填充或删除",
        tags: ["isnull", "fillna", "dropna", "缺失值分析"],
        code: "import pandas as pd\nimport numpy as np\n\ndata = {\n    \"name\": [\"张三\", \"李四\", \"王五\"],\n    \"age\": [25, np.nan, 35],\n    \"score\": [85, 92, np.nan]\n}\ndf = pd.DataFrame(data)\n\nprint(\"包含缺失值的数据：\")\nprint(df)\n\nprint(\"\\n检测缺失值：\")\nprint(df.isnull().sum())\n\nprint(\"\\n用均值填充缺失值：\")\ndf_filled = df.fillna(df.mean())\nprint(df_filled)"
    },
    4: {
        title: "数据分组与聚合统计",
        description: "学习使用groupby进行数据分组，并进行各种聚合统计",
        tags: ["groupby", "agg", "sum", "mean", "count"],
        code: "import pandas as pd\n\ndata = {\n    \"city\": [\"北京\", \"上海\", \"北京\", \"深圳\"],\n    \"sales\": [8000, 12000, 15000, 20000]\n}\ndf = pd.DataFrame(data)\n\nprint(\"按城市分组统计：\")\nprint(df.groupby('city')['sales'].sum())"
    },
    5: {
        title: "数据排序与排名计算",
        description: "学习对数据进行排序，并计算排名和百分比排名",
        tags: ["sort_values", "rank", "nlargest", "nsmallest"],
        code: "import pandas as pd\n\ndata = {\n    \"name\": [\"张三\", \"李四\", \"王五\"],\n    \"score\": [85, 92, 78]\n}\ndf = pd.DataFrame(data)\n\nprint(\"按分数降序排序：\")\nprint(df.sort_values('score', ascending=False))\n\nprint(\"\\n计算排名：\")\ndf['rank'] = df['score'].rank(ascending=False)\nprint(df)"
    },
    6: {
        title: "数据透视表分析",
        description: "学习创建数据透视表，进行多维度数据分析",
        tags: ["pivot_table", "crosstab", "pivot", "melt"],
        code: "import pandas as pd\n\ndata = {\n    \"category\": [\"A\", \"B\", \"A\", \"B\"],\n    \"region\": [\"North\", \"South\", \"North\", \"South\"],\n    \"sales\": [1000, 1500, 1200, 1800]\n}\ndf = pd.DataFrame(data)\n\nprint(\"创建透视表：\")\nprint(pd.pivot_table(df, values='sales', index='category', columns='region', aggfunc='sum'))"
    },
    7: {
        title: "字符串数据处理",
        description: "学习处理文本数据，包括字符串分割、提取、替换和匹配",
        tags: ["str.split", "str.contains", "str.replace", "正则表达式"],
        code: "import pandas as pd\n\ndata = {\n    \"name\": [\"张三\", \"李四\", \"王五\"],\n    \"email\": [\"zhangsan@example.com\", \"lisi@company.com\", \"wangwu@gmail.com\"]\n}\ndf = pd.DataFrame(data)\n\nprint(\"提取邮箱域名：\")\ndf['domain'] = df['email'].str.split('@').str[1]\nprint(df)\n\nprint(\"\\n筛选包含gmail的邮箱：\")\nprint(df[df['email'].str.contains('gmail')])"
    },
    8: {
        title: "时间序列数据处理",
        description: "学习处理日期时间数据，包括转换、提取、重采样等操作",
        tags: ["to_datetime", "dt", "resample", "时间索引"],
        code: "import pandas as pd\n\ndata = {\n    \"date\": [\"2023-01-01\", \"2023-01-02\", \"2023-01-03\"],\n    \"sales\": [1200, 1500, 1800]\n}\ndf = pd.DataFrame(data)\n\ndf['date'] = pd.to_datetime(df['date'])\n\nprint(\"提取日期组件：\")\ndf['year'] = df['date'].dt.year\ndf['month'] = df['date'].dt.month\ndf['day'] = df['date'].dt.day\nprint(df)"
    },
    9: {
        title: "数据合并与连接",
        description: "学习使用merge、concat等方法合并多个数据集",
        tags: ["merge", "concat", "join", "数据整合"],
        code: "import pandas as pd\n\ndf1 = pd.DataFrame({\n    'id': [1, 2, 3],\n    'name': [\"张三\", \"李四\", \"王五\"]\n})\n\ndf2 = pd.DataFrame({\n    'id': [1, 2, 4],\n    'salary': [8000, 12000, 15000]\n})\n\nprint(\"左连接：\")\nmerged = pd.merge(df1, df2, on='id', how='left')\nprint(merged)"
    },
    10: {
        title: "数据导出与保存",
        description: "学习将处理后的数据导出到各种格式，包括CSV、JSON等",
        tags: ["to_csv", "to_json", "导出", "保存"],
        code: "import pandas as pd\n\ndata = {\n    \"category\": [\"A\", \"B\", \"C\"],\n    \"sales\": [1000, 1500, 1200]\n}\ndf = pd.DataFrame(data)\n\nprint(\"导出为CSV格式：\")\nprint(df.to_csv(index=False))\n\nprint(\"\\n导出为JSON格式：\")\nprint(df.to_json(orient='records', indent=2))"
    }
};

let currentSkillId = 1;
// API 配置

document.addEventListener('DOMContentLoaded', async function() {
    renderModules();
    await initPyodide();
});

function renderModules() {
    const grid = document.getElementById('modulesGrid');
    let html = '';
    
    for (let i = 1; i <= 10; i++) {
        const skill = skillData[i];
        html += '<div class="module-card" onclick="openLearnPage(' + i + ')">';
        html += '<div class="module-number">' + String(i).padStart(2, '0') + '</div>';
        html += '<div class="module-content">';
        html += '<h3>' + skill.title + '</h3>';
        html += '<p>' + skill.description + '</p>';
        html += '<div class="module-tags">';
        skill.tags.forEach(function(tag) {
            html += '<span class="module-tag">' + tag + '</span>';
        });
        html += '</div></div></div>';
    }
    
    grid.innerHTML = html;
}

function scrollToModules() {
    document.getElementById('modulesSection').scrollIntoView({ behavior: 'smooth' });
}

// API 基础 URL - 部署后需要更新为实际的 Render 服务 URL
const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
    ? ''  // 本地使用相对路径
    : 'https://pandas-training-api.onrender.com';  // Render 部署后的 URL

function openLearnPage(skillId) {
    currentSkillId = skillId;
    
    document.getElementById('homePage').classList.add('hidden');
    document.getElementById('learnPage').classList.add('active');
    
    document.getElementById('learnTitle').textContent = skillData[skillId].title;
    document.getElementById('skillBadge').textContent = String(skillId).padStart(2, '0');
    document.getElementById('codeInput').value = skillData[skillId].code;
    document.getElementById('outputContent').innerHTML = '点击运行按钮执行代码...<br><br>💡 提示：你可以在左侧学习知识点，然后在右侧编写和运行 Pandas 代码进行练习。';
    
    // 启用运行按钮
    document.getElementById('runBtn').disabled = false;
}

function goHome() {
    document.getElementById('homePage').classList.remove('hidden');
    document.getElementById('learnPage').classList.remove('active');
}

async function runCode() {
    const codeInput = document.getElementById('codeInput');
    const outputContent = document.getElementById('outputContent');
    
    if (!codeInput.value.trim()) {
        outputContent.innerHTML = '<span style="color: #dc2626;">❌ 请输入代码后再运行</span>';
        return;
    }
    
    outputContent.innerHTML = '<span style="color: #3b82f6;">⏳ 正在执行代码...</span>';
    
    try {
        const response = await fetch(`${API_BASE_URL}/api/execute`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                code: codeInput.value,
                skill_id: currentSkillId
            })
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            let output = '<span style="color: #059669;">✅ 代码执行成功</span><br><br>';
            output += '<pre>' + escapeHtml(data.output) + '</pre>';
            
            if (data.image) {
                output += '<br><img src="data:image/png;base64,' + data.image + '" style="max-width: 100%; border-radius: 4px;">';
            }
            
            outputContent.innerHTML = output;
        } else {
            outputContent.innerHTML = '<span style="color: #dc2626;">❌ 执行错误：</span><br><br><pre>' + escapeHtml(data.output) + '</pre>';
        }
    } catch (error) {
        outputContent.innerHTML = '<span style="color: #dc2626;">❌ 请求失败：' + error.message + '</span><br><br>请确保后端服务已启动。';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function clearCode() {
    document.getElementById('codeInput').value = skillData[currentSkillId].code;
    document.getElementById('outputContent').textContent = '点击运行按钮执行代码...';
}
</script>
</body>
</html>
